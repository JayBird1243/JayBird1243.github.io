<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokenized File Classification | Jack Buhr</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="background-container">
        <div id="stars-container"></div>
        <div id="nodes-container"></div>
    </div>

    <header>
        <nav>
            <div class="logo">JB</div>
            <div id="seed-display" class="seed-display">Seed: </div>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../design.html" class="active">Design</a></li>
                <li><a href="../skills.html">Skills</a></li>
            </ul>
        </nav>
    </header>

    <main id="content-wrapper">
        <section class="hero">
            <h1>Tokenized File Classification</h1>
            <a href="../design.html" class="deep-dive-btn">← Back to Design</a>
        </section>

        <section class="content-box">
            <div style="text-align: center; margin-bottom: 2rem;">
                <svg width="150" height="150" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#FFD700" stroke="#B8860B" stroke-width="4"/>
                    <circle cx="50" cy="50" r="35" fill="none" stroke="#DAA520" stroke-width="2" stroke-dasharray="4 2"/>
                    <text x="50" y="65" font-family="serif" font-size="40" font-weight="bold" fill="#B8860B" text-anchor="middle">$</text>
                    <path d="M50 5 L50 15 M50 85 L50 95 M5 50 L15 50 M85 50 L95 50" stroke="#DAA520" stroke-width="2"/>
                </svg>
            </div>
            <h2>Project Details</h2>
            <ul>
                <li>Used to classify technical data dump</li>
                <li>Filename tokenization to link nonsensical part numbers across directories</li>
            </ul>
        </section>

    <footer id="site-footer">
        <div class="footer-inner">
            <div class="footer-field">
                <span class="footer-label">seed</span>
                <span id="footer-seed-val" class="footer-mono">—</span>

            <div class="footer-vr" aria-hidden="true"></div>
            <div class="footer-field">
                <span id="footer-stars-count" class="footer-num">—</span>
                <span class="footer-label">stars</span>
            </div>
            <div class="footer-field">
                <span id="footer-nodes-count" class="footer-num">—</span>
                <span class="footer-label">nodes</span>
            </div>
            <div class="footer-vr" aria-hidden="true"></div>
            <div class="footer-size-bars" id="footer-size-bars" aria-label="Star size distribution"></div>
            <button id="reroll-btn" class="footer-reroll-btn" aria-label="Generate new sky">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
