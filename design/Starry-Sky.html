<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry Sky | Jack Buhr</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="background-container">
        <div id="stars-container"></div>
        <div id="nodes-container"></div>
    </div>

    <header>
        <nav>
            <div class="logo">JB</div>
            <div id="seed-display" class="seed-display">Seed: </div>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../design.html" class="active">Design</a></li>
                <li><a href="../skills.html">Skills</a></li>
            </ul>
        </nav>
    </header>

    <main id="content-wrapper">
        <section class="hero">
            <h1>Starry Sky</h1>
            <a href="../design.html" class="deep-dive-btn">← Back to Design</a>
        </section>

        <section class="content-box">
            <div style="display: flex; gap: 15px; align-items: center; justify-content: center; margin-bottom: 2rem;">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="#FCD34D" style="filter: drop-shadow(0 0 8px #FCD34D); animation: pulse 2s infinite;">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                <svg width="60" height="60" viewBox="0 0 24 24" fill="#FFFFFF" style="filter: drop-shadow(0 0 8px #FFFFFF); animation: pulse 3s infinite 1s;">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#8B5CF6" style="filter: drop-shadow(0 0 8px #8B5CF6); animation: pulse 1.5s infinite 0.5s;">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
            </div>
            <h2>Project Details</h2>
            <ul>
                <li>Artistic pursuit</li>
                <li>Procedurally generated sky</li>
                <li>Graphics based on normal gradients</li>
            </ul>
        </section>
    </main>

    <footer id="site-footer">
        <div class="footer-inner">
            <div class="footer-field">
                <span class="footer-label">seed</span>
                <span id="footer-seed-val" class="footer-mono">—</span>
            </div>
            <div class="footer-vr" aria-hidden="true"></div>
            <div class="footer-field">
                <span id="footer-stars-count" class="footer-num">—</span>
                <span class="footer-label">stars</span>
            </div>
            <div class="footer-field">
                <span id="footer-nodes-count" class="footer-num">—</span>
                <span class="footer-label">nodes</span>
            </div>
            <div class="footer-vr" aria-hidden="true"></div>
            <div class="footer-size-bars" id="footer-size-bars" aria-label="Star size distribution"></div>
            <button id="reroll-btn" class="footer-reroll-btn" aria-label="Generate new sky">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                new sky
            </button>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
